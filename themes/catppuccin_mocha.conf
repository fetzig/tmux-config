# Catppuccin Mocha (Dark) theme configuration for tmux
set -g @catppuccin_flavor 'mocha'

# Unset theme color variables to allow override (workaround for -ogq flag)
set -gu @thm_bg
set -gu @thm_fg
set -gu @thm_crust
set -gu @thm_mantle
set -gu @thm_surface_0
set -gu @thm_surface_1
set -gu @thm_overlay_0
set -gu @thm_overlay_1
set -gu @thm_overlay_2

# Unset status module colors to ensure they update with new @thm_fg
set -gu @catppuccin_status_application_text_fg
set -gu @catppuccin_status_application_icon_fg
set -gu @catppuccin_status_application_icon_bg
set -gu @catppuccin_status_session_text_fg
set -gu @catppuccin_status_session_icon_fg
set -gu @catppuccin_status_session_icon_bg
set -gu @catppuccin_status_user_text_fg
set -gu @catppuccin_status_user_icon_fg
set -gu @catppuccin_status_user_icon_bg
set -gu @catppuccin_status_host_text_fg
set -gu @catppuccin_status_host_icon_fg
set -gu @catppuccin_status_host_icon_bg
set -gu @catppuccin_status_date_time_text_fg
set -gu @catppuccin_status_date_time_icon_fg
set -gu @catppuccin_status_date_time_icon_bg
set -gu @catppuccin_status_battery_text_fg
set -gu @catppuccin_status_battery_icon_fg
set -gu @catppuccin_status_battery_icon_bg

# Load theme colors
source ~/.config/tmux/plugins/tmux/themes/catppuccin_mocha_tmux.conf

# Load catppuccin options and main config
source ~/.config/tmux/plugins/tmux/catppuccin_options_tmux.conf
source ~/.config/tmux/plugins/tmux/catppuccin_tmux.conf

# Configure status bar with catppuccin modules (must be after catppuccin loads)
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_user}"
set -ag status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Load battery plugin last - it interpolates battery placeholders in status-right
run-shell ~/.config/tmux/plugins/tmux-battery/battery.tmux
